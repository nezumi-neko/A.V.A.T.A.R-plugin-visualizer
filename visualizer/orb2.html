<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>A.V.A.T.A.R Orb — Graphe</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:transparent;
  overflow:hidden;
  width:100vw; height:100vh;
  display:flex; align-items:center; justify-content:center;
  -webkit-app-region:no-drag;
}
canvas { display:block; -webkit-app-region:no-drag; }
#close-btn {
  position:absolute; top:10px; right:14px;
  color:rgba(80,200,255,0.3); font-size:14px;
  cursor:pointer; -webkit-app-region:no-drag;
  transition:color 0.2s; font-family:monospace;
}
#close-btn:hover { color:rgba(150,230,255,0.9); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="close-btn" onclick="window.close()">✕</div>
<script>
// ═══════════════════════════════════════════════
//  ÉTATS
// ═══════════════════════════════════════════════
const STATES = {
  idle:   { energy:0.12, signalRate:0.005, signalSpeed:0.12, ringAlpha:0.06, label:'idle' },
  listen: { energy:0.65, signalRate:0.08, signalSpeed:0.70, ringAlpha:0.45, label:'écoute' },
  speak:  { energy:1.00, signalRate:0.18, signalSpeed:1.20, ringAlpha:0.80, label:'parole' }
};
let STATE='idle', curEnergy=0.3, tgtEnergy=0.3;
let curRate=0.03, tgtRate=0.03;
let curSpeed=0.35, tgtSpeed=0.35;
let curRingA=0.18, tgtRingA=0.18;
let audioLevel=0, audioBass=0, audioMid=0, audioTreble=0;


// ═══════════════════════════════════════════════════
//  AUDIO : sortie Windows + entrée micro en parallèle
// ═══════════════════════════════════════════════════
const AUDIO_SENSITIVITY = 2.4;
const NOISE_GATE        = 0.035;

let audioCtx = null;

// Sortie audio Windows via loopback / Stereo Mix / VB-CABLE / VoiceMeeter
let outAnalyser = null;
let outFreqData = null;
let outTimeData = null;
let outStream   = null;

// Entrée micro réelle
let micAnalyser = null;
let micFreqData = null;
let micTimeData = null;
let micStream   = null;

let isListening = false;
let loopbackId  = null;

// Détecte Stereo Mix / What U Hear / VB-CABLE / VoiceMeeter / loopback Windows
async function detectLoopback() {
  try {
    const tmpStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    tmpStream.getTracks().forEach(t => t.stop());

    const devs = await navigator.mediaDevices.enumerateDevices();
    const lb = devs.find(d => d.kind === 'audioinput' && (
      d.label.toLowerCase().includes('stereo mix') ||
      d.label.toLowerCase().includes('mélange stéréo') ||
      d.label.toLowerCase().includes('melange stereo') ||
      d.label.toLowerCase().includes('what u hear') ||
      d.label.toLowerCase().includes('wave out mix') ||
      d.label.toLowerCase().includes('loopback') ||
      d.label.toLowerCase().includes('cable output') ||
      d.label.toLowerCase().includes('vb-audio') ||
      d.label.toLowerCase().includes('voicemeeter output') ||
      d.label.toLowerCase().includes('voicemeeter aux output') ||
      d.label.toLowerCase().includes('voicemeeter vaio')
    ));

    if (lb) { loopbackId = lb.deviceId; console.log('Loopback détecté:', lb.label); }
    else    { console.log('Aucun loopback détecté — micro uniquement'); }
  } catch(e) { console.warn('detectLoopback:', e); }
}
detectLoopback();

function createAnalyser() {
  const a = audioCtx.createAnalyser();
  a.fftSize = 1024;
  a.minDecibels = -90;
  a.maxDecibels = -10;
  a.smoothingTimeConstant = 0.35;
  return a;
}

async function openAudioInput(deviceId) {
  const constraints = deviceId
    ? { audio: { deviceId: { exact: deviceId }, echoCancellation: false, noiseSuppression: false, autoGainControl: false }, video: false }
    : { audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, video: false };

  try {
    return await navigator.mediaDevices.getUserMedia(constraints);
  } catch(e) {
    return await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  }
}

async function startAudio(deviceId) {
  if (isListening) return;

  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      console.warn('visualizer: getUserMedia indisponible');
      return;
    }

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    // 1) Micro toujours actif
    micStream = await openAudioInput(null);
    micAnalyser = createAnalyser();
    micFreqData = new Uint8Array(micAnalyser.frequencyBinCount);
    micTimeData = new Uint8Array(micAnalyser.fftSize);
    audioCtx.createMediaStreamSource(micStream).connect(micAnalyser);
    console.log('Micro surveillé');

    // 2) Sortie audio si périphérique disponible
    const outputId = deviceId || loopbackId;
    if (outputId) {
      try {
        outStream = await openAudioInput(outputId);
        outAnalyser = createAnalyser();
        outFreqData = new Uint8Array(outAnalyser.frequencyBinCount);
        outTimeData = new Uint8Array(outAnalyser.fftSize);
        audioCtx.createMediaStreamSource(outStream).connect(outAnalyser);
        console.log('Sortie audio surveillée');
      } catch(e) {
        console.warn('Sortie audio non disponible, micro seul:', e);
      }
    }

    isListening = true;
  } catch(e) {
    console.warn('visualizer: audio non disponible', e);
  }
}

function stopAudio() {
  isListening = false;

  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (outStream) { outStream.getTracks().forEach(t => t.stop()); outStream = null; }

  if (audioCtx) {
    audioCtx.close();
    audioCtx = null;
  }

  micAnalyser = null;
  outAnalyser = null;
}

function avgFreqFrom(analyser, freqData, minHz, maxHz) {
  if (!analyser || !audioCtx || !freqData) return 0;
  const nyquist = audioCtx.sampleRate / 2;
  const start = Math.max(0, Math.floor(minHz / nyquist * freqData.length));
  const end   = Math.min(freqData.length - 1, Math.ceil(maxHz / nyquist * freqData.length));
  let sum = 0, count = 0;
  for (let i = start; i <= end; i++) { sum += freqData[i]; count++; }
  return count ? Math.min(1, (sum / count) / 180) : 0;
}

function metricsFrom(analyser, freqData, timeData) {
  if (!analyser || !freqData || !timeData) {
    return { level: 0, bass: 0, mid: 0, treble: 0 };
  }

  analyser.getByteTimeDomainData(timeData);
  analyser.getByteFrequencyData(freqData);

  let sum = 0;
  for (let i = 0; i < timeData.length; i++) {
    const v = (timeData[i] - 128) / 128;
    sum += v * v;
  }

  let rms = Math.sqrt(sum / timeData.length);
  let level = Math.max(0, (rms - NOISE_GATE) * AUDIO_SENSITIVITY);
  level = Math.min(1, Math.pow(level, 0.72));

  const bass   = avgFreqFrom(analyser, freqData, 20,   250);
  const mid    = avgFreqFrom(analyser, freqData, 250,  2200);
  const treble = avgFreqFrom(analyser, freqData, 2200, 9000);

  if (level < NOISE_GATE) {
    level = 0;
  }

  return { level, bass, mid, treble };
}

function getAudioMetrics() {
  if (!isListening) return { level: 0, bass: 0, mid: 0, treble: 0 };

  const mic = metricsFrom(micAnalyser, micFreqData, micTimeData);
  const out = metricsFrom(outAnalyser, outFreqData, outTimeData);

  let level  = Math.max(mic.level,  out.level);
  let bass   = Math.max(mic.bass,   out.bass);
  let mid    = Math.max(mic.mid,    out.mid);
  let treble = Math.max(mic.treble, out.treble);

  if (level < NOISE_GATE) {
    level = 0;
    bass = 0;
    mid = 0;
    treble = 0;
  }

  return { level, bass, mid, treble };
}


function processAudio() {
  const m = getAudioMetrics();

  const atk = m.level > audioLevel ? 0.55 : 0.45;
  audioLevel = audioLevel * (1 - atk) + m.level * atk;

  if (m.level < 0.035) audioLevel *= 0.08;

  audioBass   = m.bass   > audioBass   ? audioBass   * 0.55 + m.bass   * 0.45 : audioBass   * 0.38 + m.bass   * 0.62;
  audioMid    = m.mid    > audioMid    ? audioMid    * 0.58 + m.mid    * 0.42 : audioMid    * 0.38 + m.mid    * 0.62;
  audioTreble = m.treble > audioTreble ? audioTreble * 0.62 + m.treble * 0.38 : audioTreble * 0.35 + m.treble * 0.65;

  if (m.level < 0.035) {
    audioBass *= 0.05;
    audioMid *= 0.05;
    audioTreble *= 0.05;
  }
}

// ═══════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
let W,H,CX,CY,BOUND;

function resize(){
  W=cv.width=window.innerWidth; H=cv.height=window.innerHeight;
  CX=W/2; CY=H/2; BOUND=Math.min(W,H)*0.44;
  buildGraph();
}
window.addEventListener('resize',resize);

// ═══════════════════════════════════════════════
//  GRAPHE — nœuds sur cercles concentriques
// ═══════════════════════════════════════════════
let nodes=[], conns=[], signals=[];

function buildGraph(){
  nodes=[]; conns=[]; signals=[];
  const R=BOUND;
  const rings=[
    {r:R*0.06, n:1},
    {r:R*0.22, n:6},
    {r:R*0.44, n:10},
    {r:R*0.68, n:14},
    {r:R*0.88, n:10},
  ];
  rings.forEach(({r,n},li)=>{
    for(let i=0;i<n;i++){
      const a=(i/n)*Math.PI*2+(li*0.4);
      nodes.push({
        x:CX+Math.cos(a)*r, y:CY+Math.sin(a)*r,
        ring:li, phase:Math.random()*Math.PI*2,
        speed:0.4+Math.random()*1.0
      });
    }
  });
  const MAXD=BOUND*0.38;
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<MAXD && Math.random()<0.55)
        conns.push({i,j,d,phase:Math.random()*Math.PI*2});
    }
  }
}

function spawnSignal(){
  const c=conns[Math.floor(Math.random()*conns.length)];
  if(!c) return;
  signals.push({conn:c,t:0,speed:curSpeed*(0.8+Math.random()*0.5)});
}

// ═══════════════════════════════════════════════
//  BOUCLE DE RENDU
// ═══════════════════════════════════════════════
const t0=performance.now();

function draw(){
  requestAnimationFrame(draw);
  processAudio();

  const T=(performance.now()-t0)/1000;
  const E=tgtEnergy+audioLevel*0.4+audioBass*0.2;
  curEnergy+=(E-curEnergy)*0.04;
  curSpeed+=(tgtSpeed-curSpeed)*0.04;
  curRate+=(tgtRate-curRate)*0.04;
  curRingA+=(tgtRingA-curRingA)*0.04;

  ctx.clearRect(0,0,W,H);

  const haloR=BOUND*(0.55+curEnergy*0.35+audioBass*0.2);
  const halo=ctx.createRadialGradient(CX,CY,0,CX,CY,haloR);
  halo.addColorStop(0,`rgba(0,160,255,${0.08*curEnergy})`);
  halo.addColorStop(0.5,`rgba(0,80,180,${0.04*curEnergy})`);
  halo.addColorStop(1,'transparent');
  ctx.fillStyle=halo; ctx.fillRect(0,0,W,H);

  conns.forEach(c=>{
    const ni=nodes[c.i],nj=nodes[c.j];
    const pulse=0.5+0.5*Math.sin(T*0.8+c.phase);
    const alpha=0.05+0.08*curEnergy+0.04*pulse+audioMid*0.06;
    ctx.strokeStyle=`rgba(0,160,255,${alpha})`;
    ctx.lineWidth=0.6;
    ctx.beginPath(); ctx.moveTo(ni.x,ni.y); ctx.lineTo(nj.x,nj.y); ctx.stroke();
  });

  for(let i=signals.length-1;i>=0;i--){
    const s=signals[i];
    s.t+=s.speed*0.010;
    if(s.t>=1){signals.splice(i,1);continue;}
    const ni=nodes[s.conn.i],nj=nodes[s.conn.j];
    const sx=ni.x+(nj.x-ni.x)*s.t, sy=ni.y+(nj.y-ni.y)*s.t;
    ctx.strokeStyle=`rgba(0,200,255,${0.4*(1-s.t)})`;
    ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(ni.x,ni.y); ctx.lineTo(sx,sy); ctx.stroke();
    const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,10);
    sg.addColorStop(0,'rgba(200,240,255,0.95)');
    sg.addColorStop(0.3,'rgba(0,200,255,0.6)');
    sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg; ctx.fillRect(sx-10,sy-10,20,20);
  }

  if(Math.random()<curRate+audioLevel*0.15) spawnSignal();

  nodes.forEach(n=>{
    const pulse=0.5+0.5*Math.sin(T*n.speed+n.phase);
    const act=0.3+pulse*0.5*curEnergy+audioLevel*0.3;
    const nr=Math.max(1.5, (2+pulse*3.5*curEnergy+audioBass*4)*(BOUND/200));
    const ng=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,nr*5);
    ng.addColorStop(0,`rgba(0,200,255,${act*0.6})`);
    ng.addColorStop(0.4,`rgba(0,100,200,${act*0.2})`);
    ng.addColorStop(1,'transparent');
    ctx.fillStyle=ng; ctx.fillRect(n.x-nr*5,n.y-nr*5,nr*10,nr*10);
    ctx.fillStyle=`rgba(180,235,255,${0.7+act*0.3})`;
    ctx.beginPath(); ctx.arc(n.x,n.y,Math.max(0.8,nr*0.55),0,Math.PI*2); ctx.fill();
  });

  ctx.strokeStyle=`rgba(0,150,255,${curRingA+audioTreble*0.3})`;
  ctx.lineWidth=1.0;
  ctx.beginPath(); ctx.arc(CX,CY,BOUND,0,Math.PI*2); ctx.stroke();

  ctx.strokeStyle=`rgba(0,100,200,${curRingA*0.4})`;
  ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.arc(CX,CY,BOUND*0.68,0,Math.PI*2); ctx.stroke();
}

// ═══════════════════════════════════════════════
//  DRAG
// ═══════════════════════════════════════════════
let isDragging=false,dragX=0,dragY=0;
cv.addEventListener('mousedown',e=>{if(e.button!==0)return;isDragging=true;dragX=e.screenX;dragY=e.screenY;});
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  if(window.avatarBridge&&window.avatarBridge.moveWindow)
    window.avatarBridge.moveWindow(e.screenX-dragX,e.screenY-dragY);
  dragX=e.screenX;dragY=e.screenY;
});
window.addEventListener('mouseup',()=>isDragging=false);

// Double-clic : bascule plein écran
cv.addEventListener('dblclick', () => {
  if (window.avatarBridge?.toggleFullscreen) window.avatarBridge.toggleFullscreen();
});
// Clic droit : idem
cv.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (window.avatarBridge?.toggleFullscreen) window.avatarBridge.toggleFullscreen();
});

window.addEventListener('blur',()=>{if(window.avatarBridge)window.avatarBridge.sendToBack();});

// ═══════════════════════════════════════════════
//  ÉTAT AVATAR
// ═══════════════════════════════════════════════
let stopTimer=null;
function setState(s){
  STATE=s;
  const cfg=STATES[s]||STATES.idle;
  tgtEnergy=cfg.energy; tgtRate=cfg.signalRate;
  tgtSpeed=cfg.signalSpeed; tgtRingA=cfg.ringAlpha;
  if(stopTimer){clearTimeout(stopTimer);stopTimer=null;}
  if(s==='listen') {
    startAudio(null);                       // micro
  } else if(s==='speak') {
    startAudio(loopbackId||null);           // loopback Windows, fallback micro
  } else {
    startAudio(null);                       // idle : micro ambiant
  }
}

if(window.avatarBridge){
  window.avatarBridge.onState(setState);
}
window.addEventListener('message',e=>{if(e.data&&e.data.orbState)setState(e.data.orbState);});
document.addEventListener('keydown',e=>{
  if(e.key==='1')setState('idle');
  else if(e.key==='2')setState('listen');
  else if(e.key==='3')setState('speak');
  else if(e.key==='F11'){if(window.avatarBridge?.toggleFullscreen)window.avatarBridge.toggleFullscreen();}
});
window.addEventListener('load',()=>setTimeout(()=>setState('speak'),600));
window.addEventListener('pointerdown',()=>{
  setState('speak');
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
});
window.addEventListener('beforeunload',stopAudio);

resize();
draw();
</script>
</body>
</html>
