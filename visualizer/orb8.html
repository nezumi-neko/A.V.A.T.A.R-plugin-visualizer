<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>A.V.A.T.A.R Orb 8 — Vortex Tunnel</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:transparent; overflow:hidden; width:100vw; height:100vh; -webkit-app-region:no-drag; }
  canvas { display:block; -webkit-app-region:no-drag; }
  #close-btn { position:absolute; top:10px; right:14px; color:rgba(0,200,255,0.3); font-size:14px; cursor:pointer; -webkit-app-region:no-drag; transition:color 0.2s; font-family:monospace; }
  #close-btn:hover { color:rgba(100,230,255,0.9); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="close-btn" onclick="window.close()">✕</div>
<script>
// ═══════════════════════════════════════════════
//  ÉTATS
// ═══════════════════════════════════════════════
const STATES = {
  idle:   { speed:0.4,  rings:8,  colorH:200, twist:0.8,  glow:0.15, distort:0.06, label:'idle'   },
  listen: { speed:1.2,  rings:12, colorH:220, twist:1.8,  glow:0.35, distort:0.18, label:'écoute' },
  speak:  { speed:2.8,  rings:18, colorH:180, twist:3.5,  glow:0.65, distort:0.38, label:'parole' }
};
let cur={...STATES.idle}, tgt={...STATES.idle};
function lerp(a,b,t){return a+(b-a)*t;}
function interpolate(){
  const s=0.03, sf=0.012;
  cur.speed  =lerp(cur.speed,  tgt.speed,  sf);
  cur.rings  =lerp(cur.rings,  tgt.rings,  s);
  cur.colorH =lerp(cur.colorH, tgt.colorH, s);
  cur.twist  =lerp(cur.twist,  tgt.twist,  sf);
  cur.glow   =lerp(cur.glow,   tgt.glow,   s);
  cur.distort=lerp(cur.distort,tgt.distort,sf);
}

// AUDIO
const AUDIO_SENSITIVITY=2.4,NOISE_GATE=0.035;
let audioCtx=null,outAnalyser=null,outFreqData=null,outTimeData=null,outStream=null;
let micAnalyser=null,micFreqData=null,micTimeData=null,micStream=null;
let isListening=false,loopbackId=null;
let audioLevel=0,audioBass=0,audioMid=0,audioTreble=0;
async function detectLoopback(){try{const tmp=await navigator.mediaDevices.getUserMedia({audio:true,video:false});tmp.getTracks().forEach(t=>t.stop());const devs=await navigator.mediaDevices.enumerateDevices();const lb=devs.find(d=>d.kind==='audioinput'&&(d.label.toLowerCase().includes('stereo mix')||d.label.toLowerCase().includes('mélange stéréo')||d.label.toLowerCase().includes('melange stereo')||d.label.toLowerCase().includes('what u hear')||d.label.toLowerCase().includes('wave out mix')||d.label.toLowerCase().includes('loopback')||d.label.toLowerCase().includes('cable output')||d.label.toLowerCase().includes('vb-audio')||d.label.toLowerCase().includes('voicemeeter output')||d.label.toLowerCase().includes('voicemeeter aux output')||d.label.toLowerCase().includes('voicemeeter vaio')));if(lb)loopbackId=lb.deviceId;}catch(e){}}
detectLoopback();
function createAnalyser(){const a=audioCtx.createAnalyser();a.fftSize=1024;a.minDecibels=-90;a.maxDecibels=-10;a.smoothingTimeConstant=0.35;return a;}
async function openAudioInput(deviceId){const c=deviceId?{audio:{deviceId:{exact:deviceId},echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false}:{audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false};try{return await navigator.mediaDevices.getUserMedia(c);}catch(e){return await navigator.mediaDevices.getUserMedia({audio:true,video:false});}}
async function startAudio(deviceId){if(isListening)return;try{if(!navigator.mediaDevices?.getUserMedia)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')await audioCtx.resume();micStream=await openAudioInput(null);micAnalyser=createAnalyser();micFreqData=new Uint8Array(micAnalyser.frequencyBinCount);micTimeData=new Uint8Array(micAnalyser.fftSize);audioCtx.createMediaStreamSource(micStream).connect(micAnalyser);const outputId=deviceId||loopbackId;if(outputId){try{outStream=await openAudioInput(outputId);outAnalyser=createAnalyser();outFreqData=new Uint8Array(outAnalyser.frequencyBinCount);outTimeData=new Uint8Array(outAnalyser.fftSize);audioCtx.createMediaStreamSource(outStream).connect(outAnalyser);}catch(e){}}isListening=true;}catch(e){}}
function stopAudio(){isListening=false;if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}if(outStream){outStream.getTracks().forEach(t=>t.stop());outStream=null;}if(audioCtx){audioCtx.close();audioCtx=null;}micAnalyser=null;outAnalyser=null;}
function avgFreqFrom(analyser,freqData,minHz,maxHz){if(!analyser||!audioCtx||!freqData)return 0;const nyquist=audioCtx.sampleRate/2;const start=Math.max(0,Math.floor(minHz/nyquist*freqData.length));const end=Math.min(freqData.length-1,Math.ceil(maxHz/nyquist*freqData.length));let sum=0,count=0;for(let i=start;i<=end;i++){sum+=freqData[i];count++;}return count?Math.min(1,(sum/count)/180):0;}
function metricsFrom(analyser,freqData,timeData){if(!analyser||!freqData||!timeData)return{level:0,bass:0,mid:0,treble:0};analyser.getByteTimeDomainData(timeData);analyser.getByteFrequencyData(freqData);let sum=0;for(let i=0;i<timeData.length;i++){const v=(timeData[i]-128)/128;sum+=v*v;}let rms=Math.sqrt(sum/timeData.length);let level=Math.max(0,(rms-NOISE_GATE)*AUDIO_SENSITIVITY);level=Math.min(1,Math.pow(level,0.72));const bass=avgFreqFrom(analyser,freqData,20,250);const mid=avgFreqFrom(analyser,freqData,250,2200);const treble=avgFreqFrom(analyser,freqData,2200,9000);if(level<NOISE_GATE)level=0;return{level,bass,mid,treble};}
function getAudioMetrics(){if(!isListening)return{level:0,bass:0,mid:0,treble:0};const mic=metricsFrom(micAnalyser,micFreqData,micTimeData);const out=metricsFrom(outAnalyser,outFreqData,outTimeData);let level=Math.max(mic.level,out.level),bass=Math.max(mic.bass,out.bass),mid=Math.max(mic.mid,out.mid),treble=Math.max(mic.treble,out.treble);if(level<NOISE_GATE){level=0;bass=0;mid=0;treble=0;}return{level,bass,mid,treble};}
function processAudio(){const m=getAudioMetrics();if(m.level<0.035){m.level=0;m.bass=0;m.mid=0;m.treble=0;}const atk=m.level>audioLevel?0.55:0.45;audioLevel=audioLevel*(1-atk)+m.level*atk;if(m.level<0.035)audioLevel*=0.08;audioBass=m.bass>audioBass?audioBass*0.55+m.bass*0.45:audioBass*0.38+m.bass*0.62;audioMid=m.mid>audioMid?audioMid*0.58+m.mid*0.42:audioMid*0.38+m.mid*0.62;audioTreble=m.treble>audioTreble?audioTreble*0.62+m.treble*0.38:audioTreble*0.35+m.treble*0.65;if(m.level<0.035){audioBass*=0.05;audioMid*=0.05;audioTreble*=0.05;}}

// ═══════════════════════════════════════════════
//  CANVAS + TUNNEL
// ═══════════════════════════════════════════════
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
let W,H,CX,CY,R;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;CX=W/2;CY=H/2;R=Math.min(W,H)*0.46;}
window.addEventListener('resize',resize);

let tunnelOffset=0;
const t0=performance.now();
function draw(){
  requestAnimationFrame(draw);
  processAudio();
  interpolate();
  const T=(performance.now()-t0)/1000;

  ctx.clearRect(0,0,W,H);

  const nRings=Math.round(cur.rings*(1+audioBass*0.5));
  const speed=cur.speed*(1+audioBass*2.5+audioLevel*1.5);
  tunnelOffset=(tunnelOffset+speed*0.008)%1;

  // Halo central
  const halo=ctx.createRadialGradient(CX,CY,0,CX,CY,R*0.3);
  halo.addColorStop(0,`hsla(${cur.colorH},100%,80%,${cur.glow*0.8+audioLevel*0.4})`);
  halo.addColorStop(0.5,`hsla(${cur.colorH+20},90%,50%,${cur.glow*0.3+audioLevel*0.2})`);
  halo.addColorStop(1,'transparent');
  ctx.fillStyle=halo; ctx.fillRect(0,0,W,H);

  // Anneaux du tunnel de l'extérieur vers l'intérieur
  for(let ri=nRings;ri>=0;ri--){
    const frac=((ri/nRings)+tunnelOffset)%1;
    // Perspective : les anneaux proches du centre sont plus petits
    const perspective=Math.pow(frac,1.6);
    const ringR=R*perspective*(1+audioBass*0.25);
    if(ringR<2)continue;

    // Torsion : rotation de chaque anneau selon sa profondeur
    const twist=(1-frac)*cur.twist*(1+audioMid*1.5)*T;
    const distort=cur.distort*(1+audioLevel*1.5);

    // Nombre de segments par anneau
    const segs=Math.max(6,Math.round(24*(1+frac*2)));
    const hue=cur.colorH+frac*60+audioLevel*30;
    const light=30+frac*55+audioLevel*15;
    const alpha=(1-frac*0.6)*(0.5+cur.glow+audioLevel*0.4);

    ctx.strokeStyle=`hsla(${hue},90%,${light}%,${alpha})`;
    ctx.lineWidth=(1-frac)*4*(1+audioTreble*0.8)+0.5;
    ctx.beginPath();

    for(let si=0;si<=segs;si++){
      const a=(si/segs)*Math.PI*2+twist;
      // Distorsion audio sur le rayon
      const damp=distort*Math.sin(a*3+T*2+frac*Math.PI)*ringR;
      const r=ringR+damp;
      const x=CX+Math.cos(a)*r;
      const y=CY+Math.sin(a)*r;
      si===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath(); ctx.stroke();

    // Lignes de fuite (génératrices du tunnel)
    if(ri<nRings && ri%3===0){
      const fracNext=((( ri+1)/nRings)+tunnelOffset)%1;
      const rNext=R*Math.pow(fracNext,1.6);
      const a0=(ri/nRings)*Math.PI*2*cur.twist;
      const x0=CX+Math.cos(a0+twist)*ringR;
      const y0=CY+Math.sin(a0+twist)*ringR;
      const x1=CX+Math.cos(a0)*rNext;
      const y1=CY+Math.sin(a0)*rNext;
      ctx.strokeStyle=`hsla(${hue},80%,${light}%,${alpha*0.3})`;
      ctx.lineWidth=0.5;
      ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
    }
  }

  // Point de fuite lumineux au centre
  const pg=ctx.createRadialGradient(CX,CY,0,CX,CY,R*(0.08+audioLevel*0.12+audioBass*0.08));
  pg.addColorStop(0,`hsla(${cur.colorH},100%,98%,${0.9+audioLevel*0.1})`);
  pg.addColorStop(0.5,`hsla(${cur.colorH},100%,70%,${0.5+audioLevel*0.3})`);
  pg.addColorStop(1,'transparent');
  ctx.fillStyle=pg; ctx.fillRect(0,0,W,H);
}

// DRAG + FULLSCREEN
let isDragging=false,dragX=0,dragY=0;
cv.addEventListener('mousedown',e=>{if(e.button!==0)return;isDragging=true;dragX=e.screenX;dragY=e.screenY;});
window.addEventListener('mousemove',e=>{if(!isDragging)return;if(window.avatarBridge?.moveWindow)window.avatarBridge.moveWindow(e.screenX-dragX,e.screenY-dragY);dragX=e.screenX;dragY=e.screenY;});
window.addEventListener('mouseup',()=>isDragging=false);
cv.addEventListener('dblclick',()=>{if(window.avatarBridge?.toggleFullscreen)window.avatarBridge.toggleFullscreen();});
cv.addEventListener('contextmenu',e=>{e.preventDefault();if(window.avatarBridge?.toggleFullscreen)window.avatarBridge.toggleFullscreen();});
window.addEventListener('blur',()=>{if(window.avatarBridge)window.avatarBridge.sendToBack();});

function setState(s){tgt={...STATES[s]||STATES.idle};if(s==='listen')startAudio(null);else if(s==='speak')startAudio(loopbackId||null);else startAudio(null);}
if(window.avatarBridge)window.avatarBridge.onState(setState);
window.addEventListener('message',e=>{if(e.data?.orbState)setState(e.data.orbState);});
document.addEventListener('keydown',e=>{if(e.key==='1')setState('idle');else if(e.key==='2')setState('listen');else if(e.key==='3')setState('speak');else if(e.key==='F11'){if(window.avatarBridge?.toggleFullscreen)window.avatarBridge.toggleFullscreen();}});
window.addEventListener('load',()=>setTimeout(()=>setState('idle'),600));
window.addEventListener('pointerdown',()=>{if(audioCtx?.state==='suspended')audioCtx.resume();});
window.addEventListener('beforeunload',stopAudio);
resize();
draw();
</script>
</body>
</html>
