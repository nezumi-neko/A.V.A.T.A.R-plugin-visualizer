<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>A.V.A.T.A.R Orb 5 — Oscilloscope</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:transparent; overflow:hidden; width:100vw; height:100vh; -webkit-app-region:no-drag; }
  canvas { display:block; -webkit-app-region:no-drag; }
  #close-btn { position:absolute; top:10px; right:14px; color:rgba(0,255,180,0.3); font-size:14px; cursor:pointer; -webkit-app-region:no-drag; transition:color 0.2s; font-family:monospace; }
  #close-btn:hover { color:rgba(0,255,180,0.9); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="close-btn" onclick="window.close()">✕</div>
<script>
// ═══════════════════════════════════════════════
//  ÉTATS (même structure orb1)
// ═══════════════════════════════════════════════
const STATES = {
  idle:   { colorH:180, colorS:80,  colorL:45, lineW:1.2, rings:2, ringAlpha:0.3, waveAmp:0.06, waveFreq:1.5, glowSize:0.15, label:'idle'   },
  listen: { colorH:200, colorS:100, colorL:60, lineW:2.0, rings:3, ringAlpha:0.6, waveAmp:0.18, waveFreq:2.5, glowSize:0.28, label:'écoute' },
  speak:  { colorH:160, colorS:100, colorL:70, lineW:2.8, rings:4, ringAlpha:0.9, waveAmp:0.32, waveFreq:4.0, glowSize:0.45, label:'parole' }
};
let cur = { ...STATES.idle };
let tgt = { ...STATES.idle };
const LT = 0.04, LS = 0.015;
function lerp(a,b,t){ return a+(b-a)*t; }
function interpolate(){
  cur.colorH    = lerp(cur.colorH,    tgt.colorH,    LT);
  cur.colorS    = lerp(cur.colorS,    tgt.colorS,    LT);
  cur.colorL    = lerp(cur.colorL,    tgt.colorL,    LT);
  cur.lineW     = lerp(cur.lineW,     tgt.lineW,     LT);
  cur.ringAlpha = lerp(cur.ringAlpha, tgt.ringAlpha, LT);
  cur.waveAmp   = lerp(cur.waveAmp,   tgt.waveAmp,   LS);
  cur.waveFreq  = lerp(cur.waveFreq,  tgt.waveFreq,  LT);
  cur.glowSize  = lerp(cur.glowSize,  tgt.glowSize,  LT);
  cur.rings     = lerp(cur.rings,     tgt.rings,      LT);
}

// ═══════════════════════════════════════════════
//  AUDIO (identique orb1)
// ═══════════════════════════════════════════════
const AUDIO_SENSITIVITY = 2.4, NOISE_GATE = 0.035;
let audioCtx=null, outAnalyser=null, outFreqData=null, outTimeData=null, outStream=null;
let micAnalyser=null, micFreqData=null, micTimeData=null, micStream=null;
let isListening=false, loopbackId=null;
let audioLevel=0, audioBass=0, audioMid=0, audioTreble=0;
let rawTimeData=null; // données temporelles brutes pour l'oscilloscope

async function detectLoopback(){
  try{
    const tmp=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    tmp.getTracks().forEach(t=>t.stop());
    const devs=await navigator.mediaDevices.enumerateDevices();
    const lb=devs.find(d=>d.kind==='audioinput'&&(
      d.label.toLowerCase().includes('stereo mix')||d.label.toLowerCase().includes('mélange stéréo')||
      d.label.toLowerCase().includes('melange stereo')||d.label.toLowerCase().includes('what u hear')||
      d.label.toLowerCase().includes('wave out mix')||d.label.toLowerCase().includes('loopback')||
      d.label.toLowerCase().includes('cable output')||d.label.toLowerCase().includes('vb-audio')||
      d.label.toLowerCase().includes('voicemeeter output')||d.label.toLowerCase().includes('voicemeeter aux output')||
      d.label.toLowerCase().includes('voicemeeter vaio')));
    if(lb){loopbackId=lb.deviceId;}
  }catch(e){}
}
detectLoopback();
function createAnalyser(){
  const a=audioCtx.createAnalyser();
  a.fftSize=2048; a.minDecibels=-90; a.maxDecibels=-10; a.smoothingTimeConstant=0.35;
  return a;
}
async function openAudioInput(deviceId){
  const c=deviceId?{audio:{deviceId:{exact:deviceId},echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false}:{audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false};
  try{return await navigator.mediaDevices.getUserMedia(c);}catch(e){return await navigator.mediaDevices.getUserMedia({audio:true,video:false});}
}
async function startAudio(deviceId){
  if(isListening)return;
  try{
    if(!navigator.mediaDevices?.getUserMedia)return;
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')await audioCtx.resume();
    micStream=await openAudioInput(null);
    micAnalyser=createAnalyser();
    micFreqData=new Uint8Array(micAnalyser.frequencyBinCount);
    micTimeData=new Uint8Array(micAnalyser.fftSize);
    audioCtx.createMediaStreamSource(micStream).connect(micAnalyser);
    const outputId=deviceId||loopbackId;
    if(outputId){
      try{
        outStream=await openAudioInput(outputId);
        outAnalyser=createAnalyser();
        outFreqData=new Uint8Array(outAnalyser.frequencyBinCount);
        outTimeData=new Uint8Array(outAnalyser.fftSize);
        audioCtx.createMediaStreamSource(outStream).connect(outAnalyser);
      }catch(e){}
    }
    rawTimeData=new Uint8Array(micAnalyser.fftSize);
    isListening=true;
  }catch(e){}
}
function stopAudio(){
  isListening=false;
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
  if(outStream){outStream.getTracks().forEach(t=>t.stop());outStream=null;}
  if(audioCtx){audioCtx.close();audioCtx=null;}
  micAnalyser=null; outAnalyser=null;
}
function avgFreqFrom(analyser,freqData,minHz,maxHz){
  if(!analyser||!audioCtx||!freqData)return 0;
  const nyquist=audioCtx.sampleRate/2;
  const start=Math.max(0,Math.floor(minHz/nyquist*freqData.length));
  const end=Math.min(freqData.length-1,Math.ceil(maxHz/nyquist*freqData.length));
  let sum=0,count=0;
  for(let i=start;i<=end;i++){sum+=freqData[i];count++;}
  return count?Math.min(1,(sum/count)/180):0;
}
function metricsFrom(analyser,freqData,timeData){
  if(!analyser||!freqData||!timeData)return{level:0,bass:0,mid:0,treble:0};
  analyser.getByteTimeDomainData(timeData);
  analyser.getByteFrequencyData(freqData);
  let sum=0;
  for(let i=0;i<timeData.length;i++){const v=(timeData[i]-128)/128;sum+=v*v;}
  let rms=Math.sqrt(sum/timeData.length);
  let level=Math.max(0,(rms-NOISE_GATE)*AUDIO_SENSITIVITY);
  level=Math.min(1,Math.pow(level,0.72));
  const bass=avgFreqFrom(analyser,freqData,20,250);
  const mid=avgFreqFrom(analyser,freqData,250,2200);
  const treble=avgFreqFrom(analyser,freqData,2200,9000);
  if(level<NOISE_GATE)level=0;
  return{level,bass,mid,treble};
}
function getAudioMetrics(){
  if(!isListening)return{level:0,bass:0,mid:0,treble:0};
  const mic=metricsFrom(micAnalyser,micFreqData,micTimeData);
  const out=metricsFrom(outAnalyser,outFreqData,outTimeData);
  let level=Math.max(mic.level,out.level),bass=Math.max(mic.bass,out.bass);
  let mid=Math.max(mic.mid,out.mid),treble=Math.max(mic.treble,out.treble);
  if(level<NOISE_GATE){level=0;bass=0;mid=0;treble=0;}
  return{level,bass,mid,treble};
}
function processAudio(){
  const m=getAudioMetrics();
  if(m.level<0.035){m.level=0;m.bass=0;m.mid=0;m.treble=0;}
  const atk=m.level>audioLevel?0.55:0.45;
  audioLevel=audioLevel*(1-atk)+m.level*atk;
  if(m.level<0.035)audioLevel*=0.08;
  audioBass  =m.bass  >audioBass  ?audioBass  *0.55+m.bass  *0.45:audioBass  *0.38+m.bass  *0.62;
  audioMid   =m.mid   >audioMid   ?audioMid   *0.58+m.mid   *0.42:audioMid   *0.38+m.mid   *0.62;
  audioTreble=m.treble>audioTreble?audioTreble*0.62+m.treble*0.38:audioTreble*0.35+m.treble*0.65;
  if(m.level<0.035){audioBass*=0.05;audioMid*=0.05;audioTreble*=0.05;}
  // Récupérer les données temporelles brutes pour l'oscilloscope
  if(micAnalyser&&rawTimeData){
    if(outAnalyser&&outTimeData){
      outAnalyser.getByteTimeDomainData(outTimeData);
      // Choisir la source la plus active
      const outRms=Array.from(outTimeData).reduce((s,v)=>s+((v-128)/128)**2,0)/outTimeData.length;
      const micRms=Array.from(micTimeData).reduce((s,v)=>s+((v-128)/128)**2,0)/micTimeData.length;
      if(outRms>micRms) rawTimeData=outTimeData;
      else { micAnalyser.getByteTimeDomainData(rawTimeData); }
    } else {
      micAnalyser.getByteTimeDomainData(rawTimeData);
    }
  }
}

// ═══════════════════════════════════════════════
//  CANVAS
// ═══════════════════════════════════════════════
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
let W,H,CX,CY,R;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;CX=W/2;CY=H/2;R=Math.min(W,H)*0.38;}
window.addEventListener('resize',resize);

const t0=performance.now();
function draw(){
  requestAnimationFrame(draw);
  processAudio();
  interpolate();
  const T=(performance.now()-t0)/1000;

  ctx.clearRect(0,0,W,H);

  // Lueur de fond
  const glowR=R*(1+cur.glowSize+audioLevel*0.5+audioBass*0.3);
  const glow=ctx.createRadialGradient(CX,CY,0,CX,CY,glowR);
  const h=cur.colorH,s=cur.colorS,l=cur.colorL;
  glow.addColorStop(0,`hsla(${h},${s}%,${l}%,${0.12+audioLevel*0.15})`);
  glow.addColorStop(0.5,`hsla(${h},${s}%,${l*0.6}%,${0.05+audioLevel*0.06})`);
  glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow; ctx.fillRect(0,0,W,H);

  // Cercles concentriques (rings)
  const nRings=Math.round(cur.rings);
  for(let ri=0;ri<nRings;ri++){
    const frac=(ri+1)/(nRings+1);
    const ringR=R*(0.3+frac*0.85);
    const pulse=Math.sin(T*(1+ri*0.3)+ri*1.1)*0.02*cur.waveAmp*8+audioLevel*0.04;
    ctx.strokeStyle=`hsla(${h+ri*15},${s}%,${l}%,${cur.ringAlpha*(1-frac*0.4)+audioTreble*0.2})`;
    ctx.lineWidth=0.6+audioTreble*0.8;
    ctx.beginPath(); ctx.arc(CX,CY,ringR+pulse*R,0,Math.PI*2); ctx.stroke();
  }

  // Onde oscilloscope sur le périmètre du cercle principal
  const N=360;
  const baseAmp=cur.waveAmp+audioLevel*0.35+audioBass*0.25;
  const freq=cur.waveFreq+audioMid*3;

  ctx.lineWidth=cur.lineW+audioLevel*2.5;
  ctx.strokeStyle=`hsla(${h},${s}%,${l}%,0.92)`;
  ctx.shadowBlur=12+audioLevel*20;
  ctx.shadowColor=`hsla(${h},${s}%,${l}%,0.8)`;
  ctx.beginPath();

  for(let i=0;i<=N;i++){
    const angle=(i/N)*Math.PI*2;
    // Amplitude : depuis rawTimeData si dispo, sinon synthétique
    let amp;
    if(rawTimeData&&rawTimeData.length>0){
      const idx=Math.floor((i/N)*rawTimeData.length);
      amp=((rawTimeData[idx]-128)/128)*baseAmp*R;
    } else {
      amp=Math.sin(angle*freq*2+T*4)*baseAmp*R*0.5;
    }
    // Modulation treble = vibration rapide
    amp+=Math.sin(angle*freq*8+T*8)*audioTreble*R*0.06;
    const r=R+amp;
    const x=CX+Math.cos(angle)*r;
    const y=CY+Math.sin(angle)*r;
    if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.shadowBlur=0;

  // Onde intérieure (harmonie)
  ctx.lineWidth=(cur.lineW*0.5)+audioMid*1.5;
  ctx.strokeStyle=`hsla(${h+30},${s}%,${l+10}%,0.45)`;
  ctx.beginPath();
  for(let i=0;i<=N;i++){
    const angle=(i/N)*Math.PI*2;
    let amp;
    if(rawTimeData&&rawTimeData.length>0){
      const idx=Math.floor((i/N)*rawTimeData.length*0.5)%rawTimeData.length;
      amp=((rawTimeData[idx]-128)/128)*baseAmp*R*0.5;
    } else {
      amp=Math.sin(angle*freq*3+T*3+1.2)*baseAmp*R*0.25;
    }
    const r=R*0.55+amp;
    const x=CX+Math.cos(angle)*r;
    const y=CY+Math.sin(angle)*r;
    if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath(); ctx.stroke();

  // Point central
  ctx.fillStyle=`hsla(${h},${s}%,${Math.min(95,l+30)}%,${0.7+audioLevel*0.3})`;
  ctx.shadowBlur=15+audioLevel*25;
  ctx.shadowColor=`hsla(${h},${s}%,${l}%,1)`;
  ctx.beginPath();
  ctx.arc(CX,CY,3+audioLevel*8+audioBass*5,0,Math.PI*2);
  ctx.fill();
  ctx.shadowBlur=0;
}

// ═══════════════════════════════════════════════
//  DRAG + FULLSCREEN
// ═══════════════════════════════════════════════
let isDragging=false,dragX=0,dragY=0;
cv.addEventListener('mousedown',e=>{if(e.button!==0)return;isDragging=true;dragX=e.screenX;dragY=e.screenY;});
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  if(window.avatarBridge?.moveWindow)window.avatarBridge.moveWindow(e.screenX-dragX,e.screenY-dragY);
  dragX=e.screenX;dragY=e.screenY;
});
window.addEventListener('mouseup',()=>isDragging=false);
cv.addEventListener('dblclick',()=>{if(window.avatarBridge?.toggleFullscreen)window.avatarBridge.toggleFullscreen();});
cv.addEventListener('contextmenu',e=>{e.preventDefault();if(window.avatarBridge?.toggleFullscreen)window.avatarBridge.toggleFullscreen();});
window.addEventListener('blur',()=>{if(window.avatarBridge)window.avatarBridge.sendToBack();});

// ═══════════════════════════════════════════════
//  ÉTAT AVATAR
// ═══════════════════════════════════════════════
let currentState='idle';
function setState(s){
  currentState=s;
  tgt={...STATES[s]||STATES.idle};
  if(s==='listen')startAudio(null);
  else if(s==='speak')startAudio(loopbackId||null);
  else startAudio(null);
}
if(window.avatarBridge)window.avatarBridge.onState(setState);
window.addEventListener('message',e=>{if(e.data?.orbState)setState(e.data.orbState);});
document.addEventListener('keydown',e=>{
  if(e.key==='1')setState('idle');
  else if(e.key==='2')setState('listen');
  else if(e.key==='3')setState('speak');
  else if(e.key==='F11'){if(window.avatarBridge?.toggleFullscreen)window.avatarBridge.toggleFullscreen();}
});
window.addEventListener('load',()=>setTimeout(()=>setState('idle'),600));
window.addEventListener('pointerdown',()=>{if(audioCtx?.state==='suspended')audioCtx.resume();});
window.addEventListener('beforeunload',stopAudio);
resize();
draw();
</script>
</body>
</html>
