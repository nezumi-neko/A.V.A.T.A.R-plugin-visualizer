<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>A.V.A.T.A.R Orb 9 — Égaliseur Circulaire</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:transparent; overflow:hidden; width:100vw; height:100vh; -webkit-app-region:no-drag; }
  canvas { display:block; -webkit-app-region:no-drag; }
  #close-btn { position:absolute; top:10px; right:14px; color:rgba(100,255,180,0.3); font-size:14px; cursor:pointer; -webkit-app-region:no-drag; transition:color 0.2s; font-family:monospace; }
  #close-btn:hover { color:rgba(150,255,200,0.9); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="close-btn" onclick="window.close()">✕</div>
<script>
// ═══════════════════════════════════════════════
//  ÉTATS
// ═══════════════════════════════════════════════
const STATES = {
  idle:   { bars:48,  colorH:160, barAlpha:0.55, maxBarH:0.28, mirror:true,  glowBase:0.12, label:'idle'   },
  listen: { bars:72,  colorH:180, barAlpha:0.75, maxBarH:0.48, mirror:true,  glowBase:0.28, label:'écoute' },
  speak:  { bars:96,  colorH:140, barAlpha:0.95, maxBarH:0.72, mirror:true,  glowBase:0.55, label:'parole' }
};
let cur={...STATES.idle}, tgt={...STATES.idle};
function lerp(a,b,t){return a+(b-a)*t;}
function interpolate(){
  const s=0.04, sf=0.02;
  cur.bars     =lerp(cur.bars,     tgt.bars,     s);
  cur.colorH   =lerp(cur.colorH,   tgt.colorH,   s);
  cur.barAlpha =lerp(cur.barAlpha, tgt.barAlpha, s);
  cur.maxBarH  =lerp(cur.maxBarH,  tgt.maxBarH,  sf);
  cur.glowBase =lerp(cur.glowBase, tgt.glowBase, s);
}

// AUDIO
const AUDIO_SENSITIVITY=2.4,NOISE_GATE=0.035;
let audioCtx=null,outAnalyser=null,outFreqData=null,outTimeData=null,outStream=null;
let micAnalyser=null,micFreqData=null,micTimeData=null,micStream=null;
let isListening=false,loopbackId=null;
let audioLevel=0,audioBass=0,audioMid=0,audioTreble=0;
let fftData=null;
async function detectLoopback(){try{const tmp=await navigator.mediaDevices.getUserMedia({audio:true,video:false});tmp.getTracks().forEach(t=>t.stop());const devs=await navigator.mediaDevices.enumerateDevices();const lb=devs.find(d=>d.kind==='audioinput'&&(d.label.toLowerCase().includes('stereo mix')||d.label.toLowerCase().includes('mélange stéréo')||d.label.toLowerCase().includes('melange stereo')||d.label.toLowerCase().includes('what u hear')||d.label.toLowerCase().includes('wave out mix')||d.label.toLowerCase().includes('loopback')||d.label.toLowerCase().includes('cable output')||d.label.toLowerCase().includes('vb-audio')||d.label.toLowerCase().includes('voicemeeter output')||d.label.toLowerCase().includes('voicemeeter aux output')||d.label.toLowerCase().includes('voicemeeter vaio')));if(lb)loopbackId=lb.deviceId;}catch(e){}}
detectLoopback();
function createAnalyser(){const a=audioCtx.createAnalyser();a.fftSize=2048;a.minDecibels=-90;a.maxDecibels=-10;a.smoothingTimeConstant=0.75;return a;}
async function openAudioInput(deviceId){const c=deviceId?{audio:{deviceId:{exact:deviceId},echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false}:{audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false};try{return await navigator.mediaDevices.getUserMedia(c);}catch(e){return await navigator.mediaDevices.getUserMedia({audio:true,video:false});}}
async function startAudio(deviceId){if(isListening)return;try{if(!navigator.mediaDevices?.getUserMedia)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')await audioCtx.resume();micStream=await openAudioInput(null);micAnalyser=createAnalyser();micFreqData=new Uint8Array(micAnalyser.frequencyBinCount);micTimeData=new Uint8Array(micAnalyser.fftSize);audioCtx.createMediaStreamSource(micStream).connect(micAnalyser);const outputId=deviceId||loopbackId;if(outputId){try{outStream=await openAudioInput(outputId);outAnalyser=createAnalyser();outFreqData=new Uint8Array(outAnalyser.frequencyBinCount);outTimeData=new Uint8Array(outAnalyser.fftSize);audioCtx.createMediaStreamSource(outStream).connect(outAnalyser);}catch(e){}}fftData=new Uint8Array(micAnalyser.frequencyBinCount);isListening=true;}catch(e){}}
function stopAudio(){isListening=false;if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}if(outStream){outStream.getTracks().forEach(t=>t.stop());outStream=null;}if(audioCtx){audioCtx.close();audioCtx=null;}micAnalyser=null;outAnalyser=null;}
function avgFreqFrom(analyser,freqData,minHz,maxHz){if(!analyser||!audioCtx||!freqData)return 0;const nyquist=audioCtx.sampleRate/2;const start=Math.max(0,Math.floor(minHz/nyquist*freqData.length));const end=Math.min(freqData.length-1,Math.ceil(maxHz/nyquist*freqData.length));let sum=0,count=0;for(let i=start;i<=end;i++){sum+=freqData[i];count++;}return count?Math.min(1,(sum/count)/180):0;}
function metricsFrom(analyser,freqData,timeData){if(!analyser||!freqData||!timeData)return{level:0,bass:0,mid:0,treble:0};analyser.getByteTimeDomainData(timeData);analyser.getByteFrequencyData(freqData);let sum=0;for(let i=0;i<timeData.length;i++){const v=(timeData[i]-128)/128;sum+=v*v;}let rms=Math.sqrt(sum/timeData.length);let level=Math.max(0,(rms-NOISE_GATE)*AUDIO_SENSITIVITY);level=Math.min(1,Math.pow(level,0.72));const bass=avgFreqFrom(analyser,freqData,20,250);const mid=avgFreqFrom(analyser,freqData,250,2200);const treble=avgFreqFrom(analyser,freqData,2200,9000);if(level<NOISE_GATE)level=0;return{level,bass,mid,treble};}
function getAudioMetrics(){if(!isListening)return{level:0,bass:0,mid:0,treble:0};const mic=metricsFrom(micAnalyser,micFreqData,micTimeData);const out=metricsFrom(outAnalyser,outFreqData,outTimeData);let level=Math.max(mic.level,out.level),bass=Math.max(mic.bass,out.bass),mid=Math.max(mic.mid,out.mid),treble=Math.max(mic.treble,out.treble);if(level<NOISE_GATE){level=0;bass=0;mid=0;treble=0;}return{level,bass,mid,treble};}
function processAudio(){
  const m=getAudioMetrics();
  if(m.level<0.035){m.level=0;m.bass=0;m.mid=0;m.treble=0;}
  const atk=m.level>audioLevel?0.55:0.45;audioLevel=audioLevel*(1-atk)+m.level*atk;if(m.level<0.035)audioLevel*=0.08;
  audioBass=m.bass>audioBass?audioBass*0.55+m.bass*0.45:audioBass*0.38+m.bass*0.62;audioMid=m.mid>audioMid?audioMid*0.58+m.mid*0.42:audioMid*0.38+m.mid*0.62;audioTreble=m.treble>audioTreble?audioTreble*0.62+m.treble*0.38:audioTreble*0.35+m.treble*0.65;
  if(m.level<0.035){audioBass*=0.05;audioMid*=0.05;audioTreble*=0.05;}
  // Récupérer FFT brut depuis la source la plus active
  if(fftData){
    if(outAnalyser&&outFreqData){outAnalyser.getByteFrequencyData(outFreqData);micAnalyser.getByteFrequencyData(micFreqData);const om=outFreqData.reduce((s,v)=>s+v,0);const mm=micFreqData.reduce((s,v)=>s+v,0);fftData=om>mm?outFreqData:micFreqData;}
    else if(micAnalyser){micAnalyser.getByteFrequencyData(fftData);}
  }
}

// ═══════════════════════════════════════════════
//  CANVAS
// ═══════════════════════════════════════════════
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
let W,H,CX,CY,R;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;CX=W/2;CY=H/2;R=Math.min(W,H)*0.38;}
window.addEventListener('resize',resize);

// Pic mémorisé pour chaque barre
let peakBars=[];

const t0=performance.now();
function draw(){
  requestAnimationFrame(draw);
  processAudio();
  interpolate();
  const T=(performance.now()-t0)/1000;

  ctx.clearRect(0,0,W,H);

  const nBars=Math.round(cur.bars);
  if(peakBars.length!==nBars)peakBars=new Array(nBars).fill(0);

  // Halo
  const halo=ctx.createRadialGradient(CX,CY,R*0.1,CX,CY,R*(1.3+audioLevel*0.4));
  halo.addColorStop(0,`hsla(${cur.colorH},90%,50%,${cur.glowBase*0.8+audioLevel*0.3})`);
  halo.addColorStop(0.5,`hsla(${cur.colorH+30},80%,35%,${cur.glowBase*0.3})`);
  halo.addColorStop(1,'transparent');
  ctx.fillStyle=halo; ctx.fillRect(0,0,W,H);

  // Barres circulaires
  const maxH=R*cur.maxBarH*(1+audioLevel*0.6);
  const barW=(Math.PI*2/nBars)*0.7;

  for(let i=0;i<nBars;i++){
    const angle=(i/nBars)*Math.PI*2-Math.PI/2;

    // Valeur FFT pour cette barre (échelle logarithmique)
    let barVal=0;
    if(fftData&&fftData.length>0){
      const freqIdx=Math.floor(Math.pow(i/nBars,1.5)*fftData.length*0.7);
      barVal=fftData[Math.min(freqIdx,fftData.length-1)]/255;
    } else {
      // Synthétique si pas d'audio
      barVal=(Math.sin(angle*8+T*2)*0.5+0.5)*audioLevel;
    }

    const h=barVal*maxH*(1+audioBass*0.5*(i/nBars<0.3?1.5:1));
    peakBars[i]=Math.max(peakBars[i]*0.97,h);

    const inner=R*(0.42+audioLevel*0.04);
    const outer=inner+h;

    // Couleur : bas fréquences → teinte chaude, hautes → froide
    const freqFrac=i/nBars;
    const hue=cur.colorH+freqFrac*80+audioLevel*20;
    const light=40+barVal*45+audioLevel*10;
    const alpha=cur.barAlpha*(0.4+barVal*0.8);

    // Barre principale
    ctx.strokeStyle=`hsla(${hue},90%,${light}%,${alpha})`;
    ctx.lineWidth=Math.max(1,(Math.PI*2*R/nBars)*0.55);
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(CX+Math.cos(angle)*inner, CY+Math.sin(angle)*inner);
    ctx.lineTo(CX+Math.cos(angle)*outer, CY+Math.sin(angle)*outer);
    ctx.stroke();

    // Pic
    if(peakBars[i]>2){
      const peakR=inner+peakBars[i];
      ctx.fillStyle=`hsla(${hue},100%,80%,${alpha*0.9})`;
      ctx.beginPath();
      ctx.arc(CX+Math.cos(angle)*peakR, CY+Math.sin(angle)*peakR, 1.5,0,Math.PI*2);
      ctx.fill();
    }
  }

  // Cercle intérieur
  ctx.strokeStyle=`hsla(${cur.colorH},80%,60%,${0.3+audioLevel*0.3})`;
  ctx.lineWidth=1; ctx.lineCap='butt';
  ctx.beginPath(); ctx.arc(CX,CY,R*0.42,0,Math.PI*2); ctx.stroke();

  // Centre
  const cg=ctx.createRadialGradient(CX,CY,0,CX,CY,R*(0.15+audioLevel*0.12+audioBass*0.08));
  cg.addColorStop(0,`hsla(${cur.colorH},80%,95%,${0.8+audioLevel*0.2})`);
  cg.addColorStop(0.5,`hsla(${cur.colorH},90%,60%,${0.3+audioLevel*0.3})`);
  cg.addColorStop(1,'transparent');
  ctx.fillStyle=cg; ctx.fillRect(0,0,W,H);
}

// DRAG + FULLSCREEN
let isDragging=false,dragX=0,dragY=0;
cv.addEventListener('mousedown',e=>{if(e.button!==0)return;isDragging=true;dragX=e.screenX;dragY=e.screenY;});
window.addEventListener('mousemove',e=>{if(!isDragging)return;if(window.avatarBridge?.moveWindow)window.avatarBridge.moveWindow(e.screenX-dragX,e.screenY-dragY);dragX=e.screenX;dragY=e.screenY;});
window.addEventListener('mouseup',()=>isDragging=false);
cv.addEventListener('dblclick',()=>{if(window.avatarBridge?.toggleFullscreen)window.avatarBridge.toggleFullscreen();});
cv.addEventListener('contextmenu',e=>{e.preventDefault();if(window.avatarBridge?.toggleFullscreen)window.avatarBridge.toggleFullscreen();});
window.addEventListener('blur',()=>{if(window.avatarBridge)window.avatarBridge.sendToBack();});

function setState(s){tgt={...STATES[s]||STATES.idle};if(s==='listen')startAudio(null);else if(s==='speak')startAudio(loopbackId||null);else startAudio(null);}
if(window.avatarBridge)window.avatarBridge.onState(setState);
window.addEventListener('message',e=>{if(e.data?.orbState)setState(e.data.orbState);});
document.addEventListener('keydown',e=>{if(e.key==='1')setState('idle');else if(e.key==='2')setState('listen');else if(e.key==='3')setState('speak');else if(e.key==='F11'){if(window.avatarBridge?.toggleFullscreen)window.avatarBridge.toggleFullscreen();}});
window.addEventListener('load',()=>setTimeout(()=>setState('idle'),600));
window.addEventListener('pointerdown',()=>{if(audioCtx?.state==='suspended')audioCtx.resume();});
window.addEventListener('beforeunload',stopAudio);
resize();
draw();
</script>
</body>
</html>
